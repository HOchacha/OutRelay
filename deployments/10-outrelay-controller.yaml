apiVersion: v1
kind: Service
metadata:
  name: outrelay-controller
  namespace: outrelay
  labels:
    app.kubernetes.io/part-of: outrelay
    app.kubernetes.io/managed-by: outrelay
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/part-of: outrelay
    app.kubernetes.io/component: controller
  ports:
    - name: grpc
      port: 7444
      targetPort: 7444
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outrelay-controller
  namespace: outrelay
  labels:
    app.kubernetes.io/part-of: outrelay
    app.kubernetes.io/managed-by: outrelay
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy:
    type: Recreate # SQLite PVC is RWO; rolling update would race the lock.
  selector:
    matchLabels:
      app.kubernetes.io/part-of: outrelay
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: outrelay
        app.kubernetes.io/managed-by: outrelay
        app.kubernetes.io/component: controller
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: controller
          image: docker.io/library/outrelay-controller:dev
          imagePullPolicy: Never
          args:
            - --listen=0.0.0.0:7444
            - --db=/data/outrelay-controller.db
            - --debug-listen= # disabled in-cluster; expose via port-forward instead
            - --log-format=json
          ports:
            - name: grpc
              containerPort: 7444
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 7444
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7444
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {} # see header comment for PVC swap
